name: 'Dev Updates'
description: 'AI-powered dev update notifications with privacy modes and multi-channel dispatch'
author: 'alphakek-ai'

branding:
  icon: 'send'
  color: 'purple'

inputs:
  channels:
    description: 'YAML list of channel configurations'
    required: true
  cooldown:
    description: 'Minimum time between notifications (e.g., 6h, 1d, 30m). Empty = post on every push.'
    required: false
    default: ''
  community_rules:
    description: 'Instructions for community-facing summaries (concise, no internal details)'
    required: false
    default: |
      Describe changes in terms of user-facing impact only.
      Do not mention file paths, function names, class names, or internal architecture.
      Do not mention specific technologies, databases, or infrastructure details.
      Write as if announcing to end users who do not know the codebase.
  dev_rules:
    description: 'Instructions for developer summaries (detailed, technical)'
    required: false
    default: |
      Include technical details: file paths, function names, what specifically changed and why.
      Be precise and specific. This is for the dev team.
  title_style:
    description: 'Style for the update title'
    required: false
    default: 'catchy, under 40 chars'
  max_bullets:
    description: 'Maximum number of bullet points per summary'
    required: false
    default: '5'
  max_turns:
    description: 'Maximum Claude Code conversation turns when generating a summary. Bump if your dev_rules require reading large files (e.g. growing tracker docs).'
    required: false
    default: '30'
  dashboard:
    description: 'Generate a static kanban board HTML from the plan tracker tables (true/false). Deterministic - no LLM, no API cost.'
    required: false
    default: 'false'
  dashboard_plan_file:
    description: 'Path to the plan markdown file holding the Section 7 tracker tables (questions / tasks / decisions). Required when dashboard is true.'
    required: false
    default: ''
  dashboard_output:
    description: 'Output path for the generated board HTML. Committed back to the repo when dashboard_commit is true.'
    required: false
    default: 'board.html'
  dashboard_title:
    description: 'Title shown in the board header.'
    required: false
    default: 'Project Board'
  dashboard_subtitle:
    description: 'Subtitle shown beside the board title.'
    required: false
    default: ''
  dashboard_theme:
    description: 'JSON string of theme overrides (colors, fonts, font_links, logo_svg). Empty uses a neutral default palette. Use single quotes / a YAML block so inner double quotes survive.'
    required: false
    default: ''
  dashboard_commit:
    description: 'Commit the regenerated board back to the current branch (true/false). Uses GITHUB_TOKEN, whose pushes do not re-trigger workflows, so there is no loop. Requires contents:write on the calling job.'
    required: false
    default: 'true'
  dashboard_commit_message:
    description: 'Commit message used when the board changes.'
    required: false
    default: 'chore(board): refresh engagement board [skip ci]'

runs:
  using: 'composite'
  steps:
    # --- Load state from previous run ---
    - name: Load previous state
      if: inputs.cooldown != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
      run: |
        mkdir -p /tmp/state

        # Find the latest successful run of this workflow (exclude current run)
        CURRENT_RUN_ID="${{ github.run_id }}"
        WORKFLOW_NAME="${{ github.workflow }}"
        RUN_ID=$(gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --status success --limit 5 --json databaseId \
          --jq "[.[] | select(.databaseId != ${CURRENT_RUN_ID})][0].databaseId" 2>/dev/null || echo "")

        if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
          echo "::notice::No previous successful run found."
          exit 0
        fi

        # Find the artifact in that run
        ARTIFACT_URL=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" \
          --jq '.artifacts[] | select(.name=="dev-updates-state") | .archive_download_url' 2>/dev/null || echo "")

        if [[ -z "$ARTIFACT_URL" || "$ARTIFACT_URL" == "null" ]]; then
          echo "::notice::Previous run had no state artifact."
          exit 0
        fi

        # Download and extract
        gh api "$ARTIFACT_URL" > /tmp/state/artifact.zip 2>/dev/null || { echo "::notice::Failed to download artifact."; exit 0; }
        unzip -o -q /tmp/state/artifact.zip -d /tmp/state 2>/dev/null || { echo "::notice::Failed to unzip artifact."; exit 0; }
        echo "::notice::Loaded state artifact from run $RUN_ID"

    - name: Get commit range
      id: range
      shell: bash
      env:
        COOLDOWN: ${{ inputs.cooldown }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_BEFORE: ${{ github.event.before }}
        EVENT_AFTER: ${{ github.event.after }}
      run: |
        HEAD_SHA=$(git rev-parse HEAD)

        # --- Cooldown logic ---
        if [[ -n "$COOLDOWN" ]]; then
          # Parse cooldown to seconds
          COOLDOWN_SECONDS=0
          if [[ "$COOLDOWN" =~ ^([0-9]+)h$ ]]; then
            COOLDOWN_SECONDS=$(( ${BASH_REMATCH[1]} * 3600 ))
          elif [[ "$COOLDOWN" =~ ^([0-9]+)m$ ]]; then
            COOLDOWN_SECONDS=$(( ${BASH_REMATCH[1]} * 60 ))
          elif [[ "$COOLDOWN" =~ ^([0-9]+)d$ ]]; then
            COOLDOWN_SECONDS=$(( ${BASH_REMATCH[1]} * 86400 ))
          elif [[ "$COOLDOWN" =~ ^([0-9]+)s$ ]]; then
            COOLDOWN_SECONDS=${BASH_REMATCH[1]}
          elif [[ "$COOLDOWN" =~ ^[0-9]+$ ]]; then
            COOLDOWN_SECONDS=$COOLDOWN
          fi

          # Read state from previous run's artifact
          LAST_SHA=""
          LAST_AT="0"
          if [[ -f /tmp/state/dev-updates-state.json ]]; then
            LAST_SHA=$(python3 -c "import json; d=json.load(open('/tmp/state/dev-updates-state.json')); print(d.get('last_sha',''))")
            LAST_AT=$(python3 -c "import json; d=json.load(open('/tmp/state/dev-updates-state.json')); print(d.get('last_at','0'))")
            echo "::notice::Loaded state from previous run: sha=${LAST_SHA:0:8}, at=${LAST_AT}"
          else
            echo "::notice::No previous state found (first run or artifact expired)."
          fi

          NOW=$(date +%s)

          # On push: check cooldown
          if [[ "$EVENT_NAME" == "push" && "$LAST_AT" != "0" ]]; then
            ELAPSED=$(( NOW - LAST_AT ))
            if (( ELAPSED < COOLDOWN_SECONDS )); then
              REMAINING=$(( COOLDOWN_SECONDS - ELAPSED ))
              echo "::notice::Within cooldown (${ELAPSED}s elapsed, ${REMAINING}s remaining). Cron will catch up."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              # Forward the state unchanged
              echo "forward_sha=${LAST_SHA}" >> "$GITHUB_OUTPUT"
              echo "forward_at=${LAST_AT}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Determine commit range from state
          if [[ -z "$LAST_SHA" ]]; then
            BEFORE="${HEAD_SHA}~1"
            echo "::notice::First run — summarizing latest commit."
          elif ! git merge-base --is-ancestor "$LAST_SHA" "$HEAD_SHA" 2>/dev/null; then
            BEFORE=$(git rev-list -1 --before="24 hours ago" HEAD 2>/dev/null || echo "${HEAD_SHA}~10")
            echo "::warning::Last notified SHA (${LAST_SHA:0:8}) not in history. Falling back."
          elif [[ "$LAST_SHA" == "$HEAD_SHA" ]]; then
            echo "::notice::No new commits since last notification."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "forward_sha=${LAST_SHA}" >> "$GITHUB_OUTPUT"
            echo "forward_at=${LAST_AT}" >> "$GITHUB_OUTPUT"
            exit 0
          else
            BEFORE="$LAST_SHA"
          fi
          AFTER="$HEAD_SHA"
        else
          # --- No cooldown: realtime mode ---
          BEFORE="$EVENT_BEFORE"
          AFTER="$EVENT_AFTER"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="${AFTER}~1"
          fi
        fi

        echo "before=${BEFORE}" >> "$GITHUB_OUTPUT"
        echo "after=${AFTER}" >> "$GITHUB_OUTPUT"
        echo "skip=false" >> "$GITHUB_OUTPUT"
        echo "commit_count=$(git rev-list --count "${BEFORE}..${AFTER}" 2>/dev/null || echo 1)" >> "$GITHUB_OUTPUT"
        echo "files_changed=$(git diff --name-only "${BEFORE}" "${AFTER}" 2>/dev/null | wc -l || echo 0)" >> "$GITHUB_OUTPUT"

    - name: Detect required modes
      if: steps.range.outputs.skip != 'true'
      id: modes
      shell: bash
      run: |
        CHANNELS='${{ inputs.channels }}'
        # Support both old (private/public) and new (dev/community) mode names
        HAS_DEV=$(echo "$CHANNELS" | grep -cE 'mode:.*(dev|private)' || true)
        HAS_COMMUNITY=$(echo "$CHANNELS" | grep -cE 'mode:.*(community|public)' || true)
        echo "has_dev=$([[ $HAS_DEV -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        echo "has_community=$([[ $HAS_COMMUNITY -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

    - name: Check required secrets
      if: steps.range.outputs.skip != 'true'
      shell: bash
      run: |
        if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
          echo "::error::CLAUDE_CODE_OAUTH_TOKEN is not set. Add it as a repository secret."
          exit 1
        fi

    - name: Generate summaries
      if: steps.range.outputs.skip != 'true'
      shell: bash
      env:
        HAS_DEV: ${{ steps.modes.outputs.has_dev }}
        HAS_COMMUNITY: ${{ steps.modes.outputs.has_community }}
      run: |
        BEFORE="${{ steps.range.outputs.before }}"
        AFTER="${{ steps.range.outputs.after }}"

        TASK=""
        if [[ "$HAS_DEV" == "true" && "$HAS_COMMUNITY" == "true" ]]; then
          TASK="Write TWO summaries and save them using the Write tool:

        1. Write /tmp/summary_dev.md — a DEV (technical) summary:
        ${{ inputs.dev_rules }}

        2. Write /tmp/summary_community.md — a COMMUNITY (user-facing) summary:
        ${{ inputs.community_rules }}"
        elif [[ "$HAS_DEV" == "true" ]]; then
          TASK="Write a DEV (technical) summary and save it using the Write tool to /tmp/summary_dev.md.
        ${{ inputs.dev_rules }}"
        else
          TASK="Write a COMMUNITY (user-facing) summary and save it using the Write tool to /tmp/summary_community.md.
        ${{ inputs.community_rules }}"
        fi

        npx -y @anthropic-ai/claude-code --allowedTools "Read,Write,Bash(git *)" -p "
        You have access to a git repo. The commit range for this push is ${BEFORE}..${AFTER}.

        1. Read the README (or any top-level docs) to understand what this project is.
        2. Use git log, git diff, and any other tools to understand what changed.
        3. ${TASK}

        Each summary file should be a complete, well-formatted markdown message ready to send.
        Include a bold title, then bullet points summarizing the changes (max ${{ inputs.max_bullets }} bullets).
        Use markdown formatting naturally (bold, backticks, etc).
        Keep it concise — each bullet should be one line with an emoji prefix.

        IMPORTANT: Use the Write tool to write each file. Do not output the summaries to stdout.
        " --max-turns ${{ inputs.max_turns }} 2>/dev/null

        FAILED=false
        if [[ "$HAS_DEV" == "true" && ! -s /tmp/summary_dev.md ]]; then
          echo "::error::Claude Code did not produce dev summary"
          FAILED=true
        fi
        if [[ "$HAS_COMMUNITY" == "true" && ! -s /tmp/summary_community.md ]]; then
          echo "::error::Claude Code did not produce community summary"
          FAILED=true
        fi
        if [[ "$FAILED" == "true" ]]; then
          exit 1
        fi

    - name: Install uv
      if: steps.range.outputs.skip != 'true'
      uses: astral-sh/setup-uv@v6

    - name: Dispatch to channels
      id: dispatch
      if: steps.range.outputs.skip != 'true'
      shell: bash
      env:
        CHANNELS: ${{ inputs.channels }}
        REPO: ${{ github.repository }}
        COMMITS: ${{ steps.range.outputs.commit_count }}
        FILES: ${{ steps.range.outputs.files_changed }}
      run: |
        uv run --with telegramify-markdown --with tweepy python3 ${{ github.action_path }}/dispatch.py
        echo "dispatched=true" >> "$GITHUB_OUTPUT"

    # --- Static board (optional) ---------------------------------------------
    # Deterministic render of the plan's tracker tables. Runs whenever
    # dashboard=true, INDEPENDENT of the digest cooldown/skip, so the board
    # always reflects the latest plan even on a run that posts no digest.
    - name: Generate board
      if: inputs.dashboard == 'true'
      shell: bash
      env:
        PLAN: ${{ inputs.dashboard_plan_file }}
        OUT: ${{ inputs.dashboard_output }}
        TITLE: ${{ inputs.dashboard_title }}
        SUBTITLE: ${{ inputs.dashboard_subtitle }}
        THEME: ${{ inputs.dashboard_theme }}
        SERVER: ${{ github.server_url }}
        REPO: ${{ github.repository }}
      run: |
        if [[ -z "$PLAN" ]]; then
          echo "::error::dashboard=true but dashboard_plan_file is empty."; exit 1
        fi
        THEME_ARG=""
        if [[ -n "$THEME" ]]; then
          printf '%s' "$THEME" > /tmp/board-theme.json
          THEME_ARG="--theme /tmp/board-theme.json"
        fi
        # 'Updated' stamp = the plan file's last commit date. Stable per content
        # (so an unchanged plan never produces a new board) and never a future
        # 'revisit on' date sitting inside a tracker row.
        ASOF="$(git log -1 --format=%cs -- "$PLAN" 2>/dev/null || true)"
        ASOF_ARG=""
        if [[ -n "$ASOF" ]]; then ASOF_ARG="--as-of $ASOF"; fi
        python3 "${{ github.action_path }}/board.py" \
          --plan "$PLAN" --out "$OUT" \
          --title "$TITLE" --subtitle "$SUBTITLE" \
          --repo-url "$SERVER/$REPO" \
          $THEME_ARG $ASOF_ARG

    - name: Commit board
      if: inputs.dashboard == 'true' && inputs.dashboard_commit == 'true'
      shell: bash
      env:
        OUT: ${{ inputs.dashboard_output }}
        MSG: ${{ inputs.dashboard_commit_message }}
        BRANCH: ${{ github.ref_name }}
      run: |
        if [[ -z "$(git status --porcelain -- "$OUT")" ]]; then
          echo "::notice::Board unchanged - nothing to commit."
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "$OUT"
        git commit -m "$MSG"
        # GITHUB_TOKEN pushes do NOT re-trigger workflows (GitHub's built-in
        # recursion guard), so this never loops. Non-fatal on a push race.
        git push origin "HEAD:$BRANCH" || echo "::warning::Board push failed (non-fatal) - refreshes on next run."

    # --- Save state for next run ---
    # Forward previous state when skipped (cooldown), save new state only when dispatch succeeded
    - name: Save state
      if: inputs.cooldown != '' && (steps.range.outputs.skip == 'true' || steps.dispatch.outputs.dispatched == 'true')
      shell: bash
      run: |
        mkdir -p /tmp/state
        if [[ "${{ steps.range.outputs.skip }}" == "true" ]]; then
          # Skipped — forward previous state unchanged
          python3 -c "
        import json
        state = {'last_sha': '${{ steps.range.outputs.forward_sha }}', 'last_at': ${{ steps.range.outputs.forward_at || 0 }}}
        json.dump(state, open('/tmp/state/dev-updates-state.json', 'w'))
        "
        else
          # Posted — save current SHA and timestamp
          python3 -c "
        import json, time
        state = {'last_sha': '$(git rev-parse HEAD)', 'last_at': int(time.time())}
        json.dump(state, open('/tmp/state/dev-updates-state.json', 'w'))
        "
        fi

    - name: Upload state artifact
      if: inputs.cooldown != '' && (steps.range.outputs.skip == 'true' || steps.dispatch.outputs.dispatched == 'true')
      uses: actions/upload-artifact@v4
      with:
        name: dev-updates-state
        path: /tmp/state/dev-updates-state.json
        retention-days: 90
        overwrite: true
